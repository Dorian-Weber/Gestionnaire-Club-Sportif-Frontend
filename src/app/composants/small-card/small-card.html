<div class="bg-(--color-secondary) rounded-lg overflow-hidden shadow-lg border border-(--color-primary)/20">

  <!-- Image -->
  <div class="relative h-40">
    <img [src]="'assets/images/' + event.sport?.sportName + '.jpg'" class="w-full h-full object-cover" alt="Football">
    <div class="absolute inset-0 bg-black/40"></div>
    <app-tag variant="card">
      {{ event.sport?.sportName }}
    </app-tag>
  </div>

  <!-- Contenu -->
  <div class="p-6">
    <h3 class="text-xl font-semibold text-(--color-title)">{{ event.eventName }}</h3>

    <div class="flex items-center gap-2 text-(--color-text) mt-2">
      <i class="fa-solid fa-calendar"></i>
      <span>{{ event.eventDate | date: 'dd MMMM yyyy à HH:mm' }}</span>
    </div>

    <a class ='text-(--color-primary) hover:underline font-semibold rounded-md hover:opacity-90 transition cursor-pointer'  [routerLink]="['/event', event.idEvent]">
      Voir détails
    </a>
  </div>

</div>
