<div class="bg-(--color-neutral)/60 backdrop-blur-md border border-(--color-primary)/20 rounded-xl p-6 shadow-lg">
  <h2 class="text-xl font-semibold text-(--color-title) mb-4">Rechercher un utilisateur</h2>

  <!-- Barre de recherche -->
  <div class="flex items-center bg-(--color-neutral)/60 border border-white/10 px-4 py-2 rounded-lg w-full max-w-md">
    <i class="fa-solid fa-magnifying-glass text-(--color-primary) mr-3"></i>
    <input
      type="text"
      placeholder="Rechercher un utilisateur..."
      class="w-full px-3 py-2 rounded-md border"
      (input)="search($event)"
    />
  </div>

  <!-- Résultats de recherche -->
  @if (searchQuery().length > 0) {
    <div class="mt-4 bg-(--color-neutral)/40 border border-white/10 rounded-lg p-3">
      @for (user of searchResults(); track user.idAppUser) {
        <div class="flex items-center justify-between p-2 border-b border-white/10">
          <span class="text-(--color-title)">{{ user.appUserPseudo }}</span>
          <button
            class="px-3 py-1 rounded-md bg-(--color-primary) text-black hover:opacity-90 transition"
            (click)="sendRequest(user.idAppUser)"
          >
            Ajouter
          </button>
        </div>
      } @empty {
        <div class="text-gray-500 p-2">
          Aucun utilisateur trouvé
        </div>
      }

    </div>

  }
</div>
