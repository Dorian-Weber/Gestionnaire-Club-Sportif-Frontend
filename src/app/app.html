<header class="w-full bg-(--color-neutral) text-(--color-title) flex items-center justify-between px-4 md:px-8 py-3 md:py-4 shadow-md">

  <!-- Logo -->
  <div class="flex items-center">
    <img src="assets/images/logo-153.png" class="h-12 w-auto cursor-pointer" alt="Logo" routerLink="/">
  </div>

  <!-- Menu Principal en tant qu'invite (desktop only) -->
  <nav class="hidden md:flex items-center gap-10 font-(--font-inter) text-lg">
    <a class="hover:text-(--color-primary) transition cursor-pointer" routerLink="/">Accueil</a>
    <a class="hover:text-(--color-primary) transition cursor-pointer" routerLink="/events">Événements</a>
  </nav>

  <!-- Bouton de connexion (desktop only) -->
  <div class="hidden md:flex items-center gap-6 font-(--font-inter)">
    <a class="hover:text-(--color-primary) transition cursor-pointer">Inscription</a>
    <a class="px-4 py-2 rounded-md bg-(--color-primary) text-black font-semibold hover:opacity-90 transition cursor-pointer">
      <i class="fa-solid fa-right-to-bracket"></i> Connexion
    </a>
  </div>

  <!-- Menu burger (mobile only) -->
  <button
    class="text-(--color-primary) text-2xl md:hidden"
    (click)="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </button>

</header>

<!-- MENU MOBILE -->
@if (menuOpen()) {
  <nav class="md:hidden bg-(--color-neutral) flex flex-col gap-4 px-6 py-4 font-(--font-inter) shadow-lg">
    <a class="hover:text-(--color-primary) transition cursor-pointer" routerLink="/">Accueil</a>
    <a class="hover:text-(--color-primary) transition cursor-pointer" routerLink="/events">Événements</a>
    <a class="hover:text-(--color-primary) transition cursor-pointer">Connexion</a>
    <a class="hover:text-(--color-primary) transition cursor-pointer">Inscription</a>
  </nav>
}

<div class="bg-(--color-secondary)">
  <router-outlet/>
</div>

<footer class="w-full bg-(--color-neutral) text-(--color-text) py-6 text-center">
  <p class="text-sm">© 2026 SportHive — Tous droits réservés</p>
</footer>
