<section class="min-h-screen flex items-center justify-center
  bg-[linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('assets/images/stade.jpg')]
  bg-cover bg-center bg-no-repeat
  px-6 py-12">
  <div class="w-full max-w-md bg-(--color-secondary) text-(--color-text) rounded-xl shadow-xl border border-(--color-primary)/20 p-8">

    <!-- Titre -->
    <h1 class="text-3xl font-bold text-center text-(--color-title) font-(--font-inter) mb-6">
      Connexion à <span class="text-(--color-primary)">SportHive</span>
    </h1>

    <!-- Formulaire -->
    <form class="flex flex-col gap-5" [formGroup]="formulaire" (ngSubmit)="onLogin()">

      <!-- Email -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-(--color-title)" >Adresse email</label>
        <input
          formControlName="appUserEmail"
          type="email"
          placeholder="exemple@mail.com"
          class="w-full px-4 py-2.5 rounded-md bg-(--color-neutral) border border-(--color-primary)/30 text-(--color-text) focus:ring-2 focus:ring-(--color-primary) outline-none transition"
        >
      </div>

      <!-- Mot de passe -->
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-(--color-title)">Mot de passe</label>
        <input
          formControlName="appUserPassword"
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-md bg-(--color-neutral) border border-(--color-primary)/30 text-(--color-text) focus:ring-2 focus:ring-(--color-primary) outline-none transition"
        >
      </div>
      <!-- Bouton -->
      <app-button type="submit" size="sm_full" variant="primary">
        Se connecter
      </app-button>
    </form>

      <!-- Options -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2">
          <input type="checkbox" class="rounded border-gray-300">
          <span>Se souvenir de moi</span>
        </label>

        <a class ='text-(--color-primary) hover:underline font-semibold rounded-md hover:opacity-90 transition cursor-pointer'>
          Mot de passe oublié ?
        </a>
      </div>

    <!-- Lien inscription -->
    <p class="text-center text-sm mt-6">
      Pas encore de compte ?
      <a class ='text-(--color-primary) hover:underline font-semibold rounded-md hover:opacity-90 transition cursor-pointer' routerLink="/register" >
        Créer un compte
      </a>
    </p>
  </div>
</section>
