<section class="min-h-screen flex items-center justify-center
  bg-[linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('assets/images/stade.jpg')]
  bg-cover bg-center bg-no-repeat
  px-6 py-12">

  <div class="w-full max-w-xl bg-(--color-secondary)/90 backdrop-blur-sm
    p-8 rounded-xl shadow-lg border border-(--color-primary)/20">

<h2 class="text-3xl font-bold text-(--color-title) text-center mb-8">
      Créer un compte
    </h2>

    <form class="flex flex-col gap-5" [formGroup]="formulaire" (ngSubmit)="onSubmit()" >
      <div class="flex flex-col">
        <label class="text-(--color-title) font-semibold mb-1">Nom</label>
        <input formControlName="appUserName"
               type="text"
               class="px-4 py-2 rounded-md bg-(--color-neutral) text-(--color-title) border border-white/10 focus:border-(--color-primary) outline-none">
      </div>
      <div class="flex flex-col">
        <label class="text-(--color-title) font-semibold mb-1">Prénom</label>
        <input formControlName="appUserFirstName"
               type="text"
               class="px-4 py-2 rounded-md bg-(--color-neutral) text-(--color-title) border border-white/10 focus:border-(--color-primary) outline-none">
      </div>
      <div class="flex flex-col">
        <label class="text-(--color-title) font-semibold mb-1">Pseudo (facultatif)</label>
        <input formControlName="appUserPseudo"
               type="text"
               class="px-4 py-2 rounded-md bg-(--color-neutral) text-(--color-title) border border-white/10 focus:border-(--color-primary) outline-none">
      </div>
      <div class="flex flex-col">
        <label class="text-(--color-title) font-semibold mb-1">Téléphone</label>
        <input formControlName="appUserPhone"
               type="tel"
               class="px-4 py-2 rounded-md bg-(--color-neutral) text-(--color-title) border border-white/10 focus:border-(--color-primary) outline-none">
      </div>
      <div class="flex flex-col">
        <label class="text-(--color-title) font-semibold mb-1">Email</label>
        <input formControlName="appUserEmail"
               type="email"
               class="px-4 py-2 rounded-md bg-(--color-neutral) text-(--color-title) border border-white/10 focus:border-(--color-primary) outline-none">
      </div>
      <div class="flex flex-col">
        <label class="text-(--color-title) font-semibold mb-1">Mot de passe</label>
        <input formControlName="appUserPassword"
               type="password"
               class="px-4 py-2 rounded-md bg-(--color-neutral) text-(--color-title) border border-white/10 focus:border-(--color-primary) outline-none">
      </div>

      <div class="flex flex-col">
        <label class="text-(--color-title) font-semibold mb-1">Verification mot de passe</label>
        <input formControlName="confirmPassword"
               type="password"
               class="px-4 py-2 rounded-md bg-(--color-neutral) text-(--color-title) border border-white/10 focus:border-(--color-primary) outline-none">
      </div>

      <app-button type="submit" size="sm_full" variant="primary">
        S'inscrire
      </app-button>

    </form>

    <p class="text-center text-(--color-text) mt-6 text-sm">
      Déjà un compte ?
      <a class='text-(--color-primary) hover:underline font-semibold rounded-md hover:opacity-90 transition cursor-pointer' routerLink="/login">Connexion</a>
    </p>

  </div>
</section>
