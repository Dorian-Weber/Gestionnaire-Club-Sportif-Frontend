<section class="min-h-screen flex flex-col md:flex-row bg-(--color-secondary) text-(--color-text)">

  <!-- CONTENU PRINCIPAL -->
  <div class="flex-1 p-4 md:p-10 pb-24 md:pb-10">

    <!-- TITRE -->
    <h1 class="text-3xl md:text-4xl font-bold text-(--color-title) mb-6 md:mb-10">
      Mon espace
    </h1>

    <!-- ONGLET 1 — INFORMATIONS PERSONNELLES -->
    @if (isActive('info')) {
     <app-information></app-information>
    }

    <!-- ONGLET 2 — PROFIL PUBLIC -->
    @if (isActive("profil")) {
      <app-public-profil></app-public-profil>
    }

    <!-- ONGLET 3 — AMIS -->
    @if (isActive('friend')) {
      <app-friends></app-friends>
    }

    <!-- ONGLET 4 — RÉSERVATIONS -->
    @if (isActive('reservation')) {
      <app-my-reservations></app-my-reservations>
    }

    <!-- ONGLET 5 — VOTES -->
    @if (isActive('vote')) {
      <app-votes></app-votes>
    }

  </div>

  <!-- ONGLET À DROITE / BAS -->
  <aside
    class="w-full md:w-64
           sticky bottom-0 md:static
           border-t md:border-t-0 md:border-l border-white/10
           p-3 md:p-6
           bg-(--color-neutral)/60 backdrop-blur-md z-50">

    <nav class="flex md:flex-col justify-between md:justify-start gap-2 md:gap-4 text-(--color-title) font-semibold">

      <app-button variant="menu" (click)="setTab('info')"
                  [ngClass]="{ 'bg-(--color-primary)/20 text-(--color-primary) border-l-4 border-(--color-primary)': isActive('info') }">
        Informations
      </app-button>

      <app-button variant="menu" (click)="setTab('profil')"
                  [ngClass]="{ 'bg-(--color-primary)/20 text-(--color-primary) border-l-4 border-(--color-primary)': isActive('profil') }">
        Profil
      </app-button>

      <app-button variant="menu" (click)="setTab('friend')"
                  [ngClass]="{ 'bg-(--color-primary)/20 text-(--color-primary) border-l-4 border-(--color-primary)': isActive('friend') }">
        Amis
      </app-button>

      <app-button variant="menu" (click)="setTab('reservation')"
                  [ngClass]="{ 'bg-(--color-primary)/20 text-(--color-primary) border-l-4 border-(--color-primary)': isActive('reservation') }">
        Réservations
      </app-button>

      <app-button variant="menu" (click)="setTab('vote')"
                  [ngClass]="{ 'bg-(--color-primary)/20 text-(--color-primary) border-l-4 border-(--color-primary)': isActive('vote') }">
        Votes
      </app-button>

    </nav>
  </aside>

</section>
