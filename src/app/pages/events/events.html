<section class="py-20 px-6 md:px-12 bg-(--color-neutral)">
  <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-[250px_1fr] gap-10">

    <!-- SIDEBAR FILTRES -->
    <aside class="bg-(--color-secondary) border border-(--color-primary)/20 rounded-lg p-6
              w-full md:w-auto
              md:sticky md:top-10
              self-start">
      <h3 class="text-xl font-semibold text-(--color-title) mb-6">Filtres</h3>

      <!-- Barre de Recherche -->
      <div class="mb-6">
        <label class="block text-(--color-title) font-medium mb-2 flex items-center gap-2">
          <i class="fa-solid fa-magnifying-glass text-(--color-primary)"></i>
          Recherche
        </label>
        <input
          type="text"
          placeholder="Rechercher un événement..."
          class="w-full bg-(--color-neutral) text-(--color-title) border border-white/10 rounded-md px-3 py-2 focus:border-(--color-primary) outline-none"
        >
      </div>

      <!-- Barre de tri par Type -->
      <div class="mb-6">
        <label class="block text-(--color-title) font-medium mb-2 flex items-center gap-2">
          <i class="fa-solid fa-ticket text-(--color-primary)"></i>
          Type d’événement
        </label>
        <!-- Boucle sur eventType pour les noms -->
        <select
          class="w-full bg-(--color-neutral) text-(--color-title) border border-white/10 rounded-md px-3 py-2 focus:border-(--color-primary) outline-none cursor-pointer"
        > <option value="">Tous les types</option>
          @for (eventType of eventTypes(); track eventType.idEventType) {
            <option [value]= eventType.eventTypeName >{{ eventType.eventTypeName }}</option>
        } </select>
      </div>

      <!-- Sport -->
      <div class="mb-6">
        <label class="block text-(--color-title) font-medium mb-2 flex items-center gap-2">
          <i class="fa-solid fa-person-running text-(--color-primary)"></i>
          Sport
        </label>
        <select
          class="w-full bg-(--color-neutral) text-(--color-title) border border-white/10 rounded-md px-3 py-2 focus:border-(--color-primary) outline-none cursor-pointer"
        >
          <option value="">Tous les sports</option>
          <option value="football">Football</option>
          <option value="basketball">Basketball</option>
          <option value="course">Course à pied</option>
        </select>
      </div>

      <!-- Date -->
      <div class="mb-8">
        <label class="block text-(--color-title) font-medium mb-2 flex items-center gap-2">
          <i class="fa-solid fa-calendar-days text-(--color-primary)"></i>
          À partir du
        </label>
        <input
          type="date"
          class="w-full bg-(--color-neutral) text-(--color-title) border border-white/10 rounded-md px-3 py-2 focus:border-(--color-primary) outline-none cursor-pointer"
        >
      </div>
      <app-button variant="primary" size="sm_full">Filtrer</app-button>
    </aside>



    <!-- LISTE DES ÉVÉNEMENTS -->
    <div class="max-w-4xl mx-auto md:mx-0">
      <h2 class="text-3xl md:text-4xl font-bold text-center mb-12 text-(--color-title)">
        Événements à venir
      </h2>
      <div class="flex flex-col gap-10">

        <!-- Boucle List event -->
        @for (event of events(); track event.idEvent) {
          <app-card [event]="event"></app-card>
        }
      </div>
    </div>

  </div>
</section>
